<body>

<div class="app">

    <h2>📷 QR-Scanner</h2>

    <button id="scanToggle" class="scan-btn">▶️ Scannen</button>

    <!-- Scanner -->
    <div id="scannerOverlay">
        <video id="scannerVideo"></video>

        <div class="scanner-dark"></div>

        <div class="scan-box">
            <div class="scan-line"></div>
        </div>

        <button id="closeScanner">✕</button>
    </div>

    <!-- BottomBar -->
    <div id="bottomBar">

        <button id="scanNav">
            <div class="icon">📷</div>
            <span>Scanner</span>
        </button>

        <button id="addBtn">
            <div class="icon">➕</div>
            <span>Adresse</span>
        </button>

        <button id="callNav" disabled>
            <div class="icon">📞</div>
            <span>Anrufen</span>
        </button>

        <button id="mapsNav">
            <div class="icon">🧭</div>
            <span>Navigation</span>
        </button>

        <button id="reportNav">
            <div class="icon">📋</div>
            <span>Bericht</span>
        </button>

    </div>

    <!-- Popup -->
    <div id="infoOverlay">

        <div id="infoWindow">

            <div class="card">

                <div class="row">
                    <div>
                        <div class="label">Adresse</div>
                        <div class="value" id="address">—</div>
                    </div>
                </div>

                <div class="row">
                    <div>
                        <div class="label">Telefon</div>
                        <div class="value" id="phone">—</div>
                    </div>

                    <button class="call-btn" id="callBtn" disabled>📞</button>
                </div>

                <div class="row">
                    <div>
                        <div class="label">Betrag</div>
                        <div class="value" id="amount">—</div>
                    </div>

                    <button class="zufugen-btn" id="editBtn">✏️</button>
                </div>

                <div class="buttons">
                    <button class="google" id="googleBtn" disabled>
                        Google Maps
                    </button>

                    <button class="apple" id="appleBtn" disabled>
                        Apple Maps
                    </button>
                </div>

            </div>

        </div>

    </div>

    <!-- Verlauf -->
    <div class="card">

        <div class="label">Verlauf</div>

        <div id="history"></div>

        <button id="deleteBtn"
            style="margin-top:10px;background:#ff3b30;color:white;">
            🗑 Löschen
        </button>

    </div>

    <!-- Confirm -->
    <div id="confirmBox"
         style="display:none;position:fixed;inset:0;
                background:rgba(0,0,0,.4);z-index:1000;">

        <div style="
            background:#fff;
            margin:40% auto;
            padding:20px;
            width:85%;
            max-width:320px;
            border-radius:16px;
            text-align:center;">

            <div style="font-size:16px;margin-bottom:20px;">
                Eintrag wirklich löschen?
            </div>

            <div style="display:flex;gap:10px;">

                <button id="cancelDel"
                    style="flex:1;padding:12px;border-radius:12px;
                    border:none;background:#ddd;">
                    Abbrechen
                </button>

                <button id="okDel"
                    style="flex:1;padding:12px;border-radius:12px;
                    border:none;background:#ff3b30;color:white;">
                    Löschen
                </button>

            </div>

        </div>

    </div>

    <!-- Schichtbericht -->
    <div class="card" id="shiftReport">

        <div class="label">Schichtbericht</div>

        <div class="row">
            <span>Anzahl Adressen</span>
            <b id="reportCount">0</b>
        </div>

        <div class="row">
            <span>Summe Betrag (€)</span>
            <b id="reportSum">0.00</b>
        </div>

        <div class="row">
            <span>Lohn (€)</span>
            <input id="lohn" type="number" step="0.01">
        </div>

        <div class="row">
            <span>Benzin (€)</span>
            <input id="benzin" type="number" step="0.01">
        </div>

        <div class="row">
            <span>Sonstige (€)</span>
            <input id="sonstige" type="number" step="0.01">
        </div>

        <div class="row">
            <span><b>Ergebnis (€)</b></span>
            <b id="reportResult">0.00</b>
        </div>

    </div>

    <!-- Edit -->
    <div id="editBox"
         style="display:none;position:fixed;inset:0;
                background:rgba(0,0,0,.4);z-index:1000;">

        <div style="
            background:#fff;
            margin:20% auto;
            padding:20px;
            width:85%;
            max-width:340px;
            border-radius:16px;">

            <h3 style="margin-top:0;text-align:center;">Eintrag</h3>

            <label class="label">Adresse</label>
            <input id="editAddress" type="text">

            <div id="streetHints"></div>

            <label class="label">Telefon</label>
            <input id="editPhone" type="tel">

            <label class="label">Betrag (€)</label>
            <input id="editAmount" type="number" step="0.01">

            <div style="display:flex;gap:10px;margin-top:15px;">
                <button id="editCancel" class="gray">Abbrechen</button>
                <button id="editSave" class="google">Speichern</button>
            </div>

        </div>

    </div>

</div>

<div id="reportBackdrop">
    <button id="closeReport">✕</button>
</div>
